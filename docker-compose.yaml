version: '3.8'
services:
  db:
    image: mariadb:11
    container_name: ecommerce_db
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    command: ['--character-set-server=utf8mb4', '--collation-server=utf8mb4_general_ci']
    volumes:
      - ./online_clothes_shop_db.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    image: python:3.12-slim
    container_name: streamlit_app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - db
    command: >
      sh -c "pip install streamlit mysql-connector-python pymysql pytest python-dotenv &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0"